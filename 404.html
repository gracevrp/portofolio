<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --ink:#23303B; --soft:#5E6B76; --card:#FFFFFF;
    --tangerine:#F4742B; --tangerine-soft:#FFE8DC;
    --teal:#119C84; --teal-soft:#DCF3EE;
    --sun:#FFD23F; --sun-soft:#FFF3C9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--ink);
    font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;
    background-image:radial-gradient(rgba(35,48,59,.08) 1px, transparent 1px);
    background-size:26px 26px;padding:24px;
  }
  .wrap{max-width:560px;width:100%;text-align:center}
  .code{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:clamp(80px,18vw,140px);line-height:1;letter-spacing:-.03em;
    position:relative;display:inline-block;margin-bottom:6px;
  }
  .code::after{
    content:"";position:absolute;left:-8px;right:-8px;bottom:8%;height:34%;
    background:var(--sun);z-index:-1;border-radius:8px;transform:rotate(-1.5deg);
  }
  .sub{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    font-size:clamp(20px,4vw,26px);margin-bottom:26px;
  }
  /* kartu bug report */
  .bug-card{
    text-align:left;background:var(--card);
    border:2.5px solid var(--ink);border-radius:16px;overflow:hidden;
    box-shadow:6px 6px 0 var(--tangerine-soft);margin-bottom:30px;
  }
  .bug-head{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 18px;border-bottom:2.5px solid var(--ink);
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  }
  .bug-head .sev{
    background:var(--tangerine);color:#fff;border:2px solid var(--ink);
    border-radius:7px;padding:3px 9px;font-size:10.5px;letter-spacing:.05em;
    transform:rotate(2deg);box-shadow:2px 2px 0 var(--ink);
  }
  .bug-body{padding:16px 18px;font-size:14.5px}
  .bug-body .row{display:flex;gap:10px;padding:4px 0}
  .bug-body .k{
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
    color:var(--soft);letter-spacing:.05em;text-transform:uppercase;
    flex-shrink:0;width:92px;padding-top:2px;
  }
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'Space Mono',monospace;font-size:13.5px;font-weight:700;
    text-decoration:none;padding:13px 26px;border-radius:14px;
    border:2.5px solid var(--ink);color:#fff;background:var(--teal);
    box-shadow:4px 4px 0 var(--ink);
    transition:transform .12s, box-shadow .12s;
  }
  .btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <p class="sub">Well… this one slipped past QA. 🐞</p>

    <div class="bug-card">
      <div class="bug-head">
        <span>BUG-404 · page_not_found</span>
        <span class="sev">SEV: LOW</span>
      </div>
      <div class="bug-body">
        <div class="row"><span class="k">Steps</span><span>Open a URL that doesn't exist on this site.</span></div>
        <div class="row"><span class="k">Expected</span><span>A page loads.</span></div>
        <div class="row"><span class="k">Actual</span><span>Nothing here — the page was moved, renamed, or never existed.</span></div>
        <div class="row"><span class="k">Workaround</span><span>Head back to the homepage below.</span></div>
      </div>
    </div>

    <a class="btn" href="/portofolio/">← Back to homepage</a>
  </div>
</body>
</html>
